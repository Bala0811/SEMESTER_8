<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceBridge | Welcome</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-body">

    <!-- Animated Background Mesh -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">

            <div class="welcome-section">
                <h1 class="logo">VoiceBridge</h1>
                <p class="welcome-text">Speak in your language. Hear it in English.</p>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm">
                <div class="input-group">
                    <input type="email" id="l-email" placeholder="Email address" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>

                <div class="input-group">
                    <input type="password" id="l-pass" placeholder="Password" required>
                    <i class="fas fa-lock input-icon"></i>
                </div>

                <button class="btn-primary" onclick="login()">
                    Sign In <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                </button>

                <div class="toggle-link" onclick="toggleForm()">
                    New here? <strong>Create Account</strong>
                </div>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" class="hidden">
                <div class="input-group">
                    <input type="text" id="r-name" placeholder="Full name" required>
                    <i class="fas fa-user input-icon"></i>
                </div>

                <div class="input-group">
                    <input type="email" id="r-email" placeholder="Email address" required>
                    <i class="fas fa-envelope input-icon"></i>
                </div>

                <div class="input-group">
                    <input type="password" id="r-pass" placeholder="Create password (6+ chars)" required>
                    <i class="fas fa-lock input-icon"></i>
                </div>

                <button class="btn-primary" onclick="register()">
                    Create Account <i class="fas fa-check" style="margin-left: 8px;"></i>
                </button>

                <div class="toggle-link" onclick="toggleForm()">
                    Already have an account? <strong>Sign In</strong>
                </div>
            </div>

        </div>
    </div>

    <script>
        function toggleForm() {
            document.getElementById("loginForm").classList.toggle("hidden");
            document.getElementById("registerForm").classList.toggle("hidden");
        }

        function register() {
            const name = document.getElementById("r-name").value.trim();
            const email = document.getElementById("r-email").value.trim();
            const pass = document.getElementById("r-pass").value;

            if (!name || !email || !pass || pass.length < 6) {
                return alert("Please fill all fields. Password must be 6+ characters.");
            }

            if (localStorage.getItem(email)) {
                return alert("Account already exists!");
            }

            localStorage.setItem(email, JSON.stringify({ name, pass }));
            alert("Account created successfully!");
            toggleForm();
        }

        function login() {
            const email = document.getElementById("l-email").value.trim();
            const pass = document.getElementById("l-pass").value;

            if (!email || !pass) {
                return alert("Please enter email and password.");
            }

            const userData = JSON.parse(localStorage.getItem(email) || "{}");

            if (userData.pass === pass) {
                localStorage.setItem("currentUser", email);
                window.location.href = "index.html";
            } else {
                alert("Invalid email or password.");
            }
        }
    </script>

</body>
</html>
