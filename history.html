<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxBridge | History</title>
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <style>
        .history-page {
            max-width: 900px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h2 {
            font-size: 2.2rem;
            color: var(--text-primary);
            font-weight: 800;
        }

        .page-header p {
            color: var(--text-secondary);
        }

        .clear-btn {
            background: var(--accent-red-bg);
            color: var(--accent-red);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .clear-btn:hover {
            background: var(--accent-red);
            color: white;
        }

        .history-section {
            font-weight: 700;
            color: var(--accent-purple);
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-section::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .history-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            gap: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            position: relative;
        }

        .history-item:hover {
            border-color: var(--accent-purple-border);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(91, 66, 243, 0.08);
        }

        .item-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-purple-light);
            color: var(--accent-purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .item-content {
            flex: 1;
        }

        .item-time {
            position: absolute;
            top: 24px;
            right: 24px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .original-text {
            color: var(--text-primary);
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
            padding-right: 60px; /* Space for time */
        }

        .translated-text {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.5;
            background: var(--bg-color);
            padding: 12px 16px;
            border-radius: 10px;
            border-left: 3px solid var(--accent-purple);
        }

        .empty-state {
            text-align: center;
            padding: 60px 0;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px dashed var(--border-color);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--border-color);
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            color: var(--text-primary);
            margin-bottom: 10px;
            font-size: 1.4rem;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">
            <i class="fas fa-microphone-alt"></i> VoxBridge
        </div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="transcribe.html">Transcribe</a>
            <a href="history.html" class="active">History</a>
            <button id="logoutBtn" class="logout-btn-light">Logout</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        
        <div class="history-page">
            <div class="page-header">
                <div>
                    <h2>Translation History</h2>
                    <p>Review and revisit your previous transcriptions.</p>
                </div>
                <button class="clear-btn" onclick="clearHistory()">
                    <i class="fas fa-trash-alt"></i> Clear All
                </button>
            </div>

            <div id="historyList">
                <!-- Javascript will inject here -->
            </div>
        </div>
        
    </div>

    <!-- Need this so script.js doesn't fail trying to access inputs -->
    <select id="lang-select" style="display:none;"></select>
    
    <!-- DO NOT link standard script.js, we write custom render for History exactly styled -->
    <script>
        // Use custom logic here so we avoid script.js expecting textarea elements
        const currentUser = localStorage.getItem("currentUser") || "guest";
        const historyKey = "history_" + currentUser;

        if (document.getElementById("logoutBtn")) {
            document.getElementById("logoutBtn").addEventListener("click", function () {
                localStorage.removeItem("currentUser");
                window.location.href = "auth.html";
            });
        }

        function clearHistory() {
            if(confirm("Are you sure you want to clear your entire history?")) {
                localStorage.removeItem(historyKey);
                renderPremiumHistory();
            }
        }

        function renderPremiumHistory() {
            const list = document.getElementById("historyList");
            let history = [];
            try {
                history = JSON.parse(localStorage.getItem(historyKey)) || [];
            } catch (e) {
                history = [];
            }
            
            list.innerHTML = "";

            if (history.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>Your history is empty</h3>
                        <p>Translations you save will appear here automatically.</p>
                        <a href="transcribe.html" style="text-decoration:none;">
                            <button class="btn-secondary" style="margin:0 auto;">
                                <i class="fas fa-microphone"></i> Start Transcribing
                            </button>
                        </a>
                    </div>
                `;
                return;
            }

            const groups = {};
            const now = new Date();
            now.setHours(0, 0, 0, 0);

            history.forEach(item => {
                const itemDate = new Date(item.timestamp);
                itemDate.setHours(0, 0, 0, 0);
                const diffDays = Math.ceil(Math.abs(now - itemDate) / (1000 * 60 * 60 * 24));

                let label;
                if (diffDays === 0) label = "Today";
                else if (diffDays === 1) label = "Yesterday";
                else if (diffDays <= 7) label = "Previous 7 Days";
                else label = "Older";

                if (!groups[label]) groups[label] = [];
                groups[label].push(item);
            });

            Object.keys(groups).forEach(section => {
                // Determine icon for section
                let icon = 'fa-calendar-day';
                if(section === 'Yesterday') icon = 'fa-calendar-minus';
                if(section === 'Previous 7 Days') icon = 'fa-calendar-week';
                if(section === 'Older') icon = 'fa-archive';

                const header = document.createElement("div");
                header.classList.add("history-section");
                header.innerHTML = `<i class="fas ${icon}"></i> ${section}`;
                list.appendChild(header);

                groups[section].forEach(item => {
                    const timeString = new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    const div = document.createElement("div");
                    div.classList.add("history-item");

                    div.innerHTML = `
                        <div class="item-icon">
                            <i class="fas fa-quote-left"></i>
                        </div>
                        <div class="item-content">
                            <div class="item-time">${timeString}</div>
                            <div class="original-text">${item.original}</div>
                            <div class="translated-text">${item.translated}</div>
                        </div>
                    `;

                    list.appendChild(div);
                });
            });
        }

        renderPremiumHistory();
    </script>
</body>
</html>
